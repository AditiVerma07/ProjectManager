<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Solid Black Canvas Background for Perfect Index.html Integration -->
  <rect width="512" height="512" fill="#000000" />

  <!-- Smooth Rounded Squircle Icon Base (Deep Blue-Black / Charcoal) -->
  <rect x="64" y="64" width="384" height="384" rx="96" fill="#0A0F1D" />

  <!-- Progress Layout Elements (Burnt Orange Variant A) -->
  <g>
    <!-- Top Progress Bar -->
    <rect x="130" y="150" width="190" height="46" rx="23" fill="#CC5500" />
    
    <!-- Middle Extended Progress Bar -->
    <rect x="170" y="233" width="212" height="46" rx="23" fill="#B34A00" />
    
    <!-- Bottom Base Progress Bar -->
    <rect x="130" y="316" width="160" height="46" rx="23" fill="#993F00" />
  </g>

  <!-- Complete Checkmark Status Badge (Burnt Orange) -->
  <g>
    <!-- Badge Outline Circle Layer for Contrast Depth -->
    <circle cx="340" cy="160" r="48" fill="#0A0F1D" />
    <!-- Main Burnt Orange Status Circle -->
    <circle cx="340" cy="160" r="40" fill="#E65F00" />
    <!-- Pure White Checkmark Graphics Asset -->
    <path d="M318 160 L332 174 L362 144" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
